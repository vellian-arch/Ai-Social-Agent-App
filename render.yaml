services:
  - type: web
    name: ai-social-agent-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src/backend uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /openapi.json
